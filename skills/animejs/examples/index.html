<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>anime.js v4 — runnable demo (no build step)</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-content: center; gap: 2.5rem;
      font-family: system-ui, sans-serif; background: #0e0e12; color: #e7e7ea;
    }
    h1 { font-size: 1rem; font-weight: 600; letter-spacing: .04em; text-align: center; opacity: .7; }
    .row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .square {
      width: 44px; height: 44px; border-radius: 10px;
      background: linear-gradient(135deg, #ff4b4b, #ff9f43);
    }
    button {
      font: inherit; padding: .5rem 1rem; border-radius: 8px; cursor: pointer;
      border: 1px solid #333; background: #1a1a22; color: #e7e7ea;
    }
    button:hover { background: #262630; }
    .controls { display: flex; gap: 10px; justify-content: center; }
  </style>
</head>
<body>
  <h1>anime.js v4 — staggered timeline (loaded from CDN, no bundler)</h1>

  <div class="row" id="grid">
    <div class="square"></div><div class="square"></div><div class="square"></div>
    <div class="square"></div><div class="square"></div><div class="square"></div>
    <div class="square"></div><div class="square"></div><div class="square"></div>
  </div>

  <div class="controls">
    <button id="play">Play</button>
    <button id="pause">Pause</button>
    <button id="restart">Restart</button>
  </div>

  <script type="module">
    // ESM straight from a CDN — swap to: import { ... } from 'animejs'  when bundling.
    import { animate, stagger, utils } from 'https://esm.sh/animejs@4';

    const anim = animate('.square', {
      y: [
        { to: -60, duration: 400, ease: 'outQuad' },
        { to: 0,   duration: 500, ease: 'outBounce' },
      ],
      rotate: { from: -180 },
      scale: [0.6, 1],
      delay: stagger(80, { from: 'center' }),
      loop: true,
      alternate: false,
    });

    utils.$('#play').forEach(b => b.onclick = () => anim.play());
    utils.$('#pause').forEach(b => b.onclick = () => anim.pause());
    utils.$('#restart').forEach(b => b.onclick = () => anim.restart());
  </script>
</body>
</html>
